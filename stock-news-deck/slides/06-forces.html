<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../assets/editorial.css">
<title>驱动力 · 三股主线</title>
</head>
<body>
<section class="slide">
  <div class="masthead">
    <div class="name"><span class="zh">市场脉动</span>MARKET PULSE</div>
    <div class="dateline">FORCES · 驱动力</div>
  </div>

  <div class="pad pad-top" style="display:grid; grid-template-rows:auto 1fr; gap:36px; height:calc(1080px - 110px)">
    <div>
      <div class="kicker">七月 · 三股驱动主线</div>
      <h2 class="display display-m" style="margin-top:14px">把波动拆开，<br/>无非这三股力量。</h2>
    </div>

    <div class="col3" style="align-self:stretch; align-content:start">
      <div>
        <div class="num" style="font-size:96px; color:var(--red)">01</div>
        <div class="sans-label" style="color:var(--red); margin:10px 0 16px">获利了结</div>
        <p class="body">科技股行至高位，筹码松动。7/1 美股半导体获利了结、纳指 −0.66%；A 股兆易创新等成长权重封死跌停。</p>
      </div>
      <div>
        <div class="num" style="font-size:96px">02</div>
        <div class="sans-label" style="margin:10px 0 16px">风格切换</div>
        <p class="body">资金从高估值成长，迁向蓝筹与价值。美股"伟大轮动"流向传统巨头；A 股银行、中药逆市护盘。</p>
      </div>
      <div>
        <div class="num" style="font-size:96px; color:var(--ink)">03</div>
        <div class="sans-label" style="margin:10px 0 16px">外部扰动</div>
        <p class="body">不明朗因素下资金转趋观望，A 股成交缩量近 5800 亿至 2.8 万亿，量能收缩放大了单边波动。</p>
      </div>
    </div>
  </div>

  <div class="byline">
    <span><span class="red-dot">●</span> MARKET PULSE · 编辑部</span>
    <span>06 / 08 · FORCES</span>
  </div>
</section>
</body>
</html>
