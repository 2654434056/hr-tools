<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../assets/editorial.css">
<title>导语 · 三市定调</title>
</head>
<body>
<section class="slide">
  <div class="masthead">
    <div class="name"><span class="zh">市场脉动</span>MARKET PULSE</div>
    <div class="dateline">THE LEAD · 导语</div>
  </div>

  <div class="pad pad-top" style="display:grid; grid-template-rows:auto 1fr; gap:40px; height:calc(1080px - 110px)">
    <div>
      <div class="kicker">一句话定调 · 2026.07.13</div>
      <h2 class="display display-l" style="margin-top:18px; max-width:1500px">
        一周之内，<span style="color:var(--red)">同一个世界</span>里的三种情绪。
      </h2>
    </div>

    <div class="col3" style="align-self:stretch; align-content:center">
      <div>
        <div class="sans-label" style="color:var(--red)">A 股 · 深调</div>
        <div class="num" style="font-size:96px; color:var(--red); margin:14px 0">−3.48%</div>
        <p class="body">深成指单日重挫，科创综指跌超 4%，全市场 176 只个股跌停，成交缩量近 5800 亿。</p>
      </div>
      <div>
        <div class="sans-label" style="color:var(--red)">美 股 · 轮动</div>
        <div class="num" style="font-size:96px; margin:14px 0">+12.8%</div>
        <p class="body">纳指上半年累计大涨，"伟大轮动"从科技巨头流向蓝筹与价值，美光一人扛下约 26% 涨幅。</p>
      </div>
      <div>
        <div class="sans-label" style="color:var(--red)">港 股 · 分化</div>
        <div class="num" style="font-size:96px; margin:14px 0; color:#1F7A4D">+5.82%</div>
        <p class="body">恒指周涨近 6% 突围，石油与银行强势，而存储芯片、PCB、光通信链集体疲软。</p>
      </div>
    </div>
  </div>

  <div class="byline">
    <span><span class="red-dot">●</span> MARKET PULSE · 编辑部</span>
    <span>02 / 08 · THE LEAD</span>
  </div>
</section>
</body>
</html>
