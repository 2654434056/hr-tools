<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../assets/editorial.css">
<title>A股 · 一日深调</title>
</head>
<body>
<section class="slide">
  <div class="masthead">
    <div class="name"><span class="zh">市场脉动</span>MARKET PULSE</div>
    <div class="dateline">A-SHARE · 07.13</div>
  </div>

  <div class="pad pad-top" style="display:grid; grid-template-columns:0.82fr 1fr; gap:72px; height:calc(1080px - 110px)">
    <!-- 左：叙事 + 三数字 -->
    <div style="display:flex; flex-direction:column; justify-content:center; gap:34px">
      <div>
        <div class="kicker">A 股 · 一日深调</div>
        <h2 class="display display-m" style="margin-top:14px; max-width:560px">从高位<br/>直坠而下</h2>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px 40px; border-top:1px solid var(--hair); padding-top:28px">
        <div class="stat"><div class="v" style="font-size:62px">28,349<span style="font-size:24px; font-weight:400; color:var(--muted)"> 亿</span></div><div class="c">沪深京成交 · 缩量 5760 亿</div></div>
        <div class="stat"><div class="v red" style="font-size:62px">176</div><div class="c">个股跌停</div></div>
        <div class="stat"><div class="v" style="font-size:62px; color:#1F7A4D">中药·银行</div><div class="c">逆市走强板块</div></div>
        <div class="stat"><div class="v red" style="font-size:62px">10/20cm</div><div class="c">科技股跌停幅度</div></div>
      </div>
    </div>

    <!-- 右：四大指数跌幅条 -->
    <div style="display:flex; flex-direction:column; justify-content:center">
      <div class="sans-label" style="margin-bottom:26px">四大指数 · 单日涨跌幅（%）</div>
      <div class="bars">
        <div class="bar-row"><div class="lbl">科创综指</div><div class="bar-track"><div class="bar-fill" style="width:100%"></div></div><div class="bar-val">−4.36</div></div>
        <div class="bar-row"><div class="lbl">深成指</div><div class="bar-track"><div class="bar-fill" style="width:80%"></div></div><div class="bar-val">−3.48</div></div>
        <div class="bar-row"><div class="lbl">创业板指</div><div class="bar-track"><div class="bar-fill" style="width:71%"></div></div><div class="bar-val">−3.10</div></div>
        <div class="bar-row"><div class="lbl">上证指数</div><div class="bar-track"><div class="bar-fill" style="width:47%"></div></div><div class="bar-val">−2.06</div></div>
      </div>
      <p class="body" style="margin-top:34px; font-size:20px; color:var(--muted)">
        兆易创新、香农芯创等科技权重封死跌停，成长板块成杀跌主力；防御性的中药与银行尾盘护盘。
      </p>
    </div>
  </div>

  <div class="byline">
    <span><span class="red-dot">●</span> MARKET PULSE · 编辑部</span>
    <span>03 / 08 · A-SHARE</span>
  </div>
</section>
</body>
</html>
