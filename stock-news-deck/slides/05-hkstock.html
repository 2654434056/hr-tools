<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../assets/editorial.css">
<title>港股 · 分化突围</title>
</head>
<body>
<section class="slide">
  <div class="masthead">
    <div class="name"><span class="zh">市场脉动</span>MARKET PULSE</div>
    <div class="dateline">H.K. · 07.02–07.13</div>
  </div>

  <div class="pad pad-top" style="display:grid; grid-template-rows:auto 1fr auto; gap:34px; height:calc(1080px - 110px)">
    <div>
      <div class="kicker">港股 · 分化突围</div>
      <h2 class="display display-m" style="margin-top:14px">恒指周涨 <span style="color:#1F7A4D">5.82%</span>，<br/>但内部已是两副面孔。</h2>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:60px; align-content:center">
      <div style="border-left:3px solid #1F7A4D; padding-left:34px">
        <div class="sans-label" style="color:#1F7A4D">7/13 当日</div>
        <div class="num" style="font-size:104px; line-height:.86">+0.16%</div>
        <p class="body" style="margin-top:6px">恒指报 <strong>24,213.72</strong>；恒生科技指数 −0.96%（4,676.43），成长继续承压。</p>
      </div>
      <div style="border-left:3px solid var(--ink); padding-left:34px">
        <div class="sans-label">强弱分野</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:14px">
          <div>
            <div class="sans-label" style="color:#1F7A4D; margin-bottom:8px">强势</div>
            <p class="body" style="font-size:21px">石油 · 银行<br/>高股息护盘</p>
          </div>
          <div>
            <div class="sans-label" style="color:var(--red); margin-bottom:8px">弱势</div>
            <p class="body" style="font-size:21px">存储芯片 −15%<br/>建滔积层板 −18%</p>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex; align-items:center; gap:28px; border-top:1px solid var(--hair); padding-top:24px">
      <div class="sans-label">区间</div>
      <div class="num" style="font-size:46px; color:#1F7A4D">22,953 → 24,213</div>
      <div class="body" style="font-size:19px; color:var(--muted)">7/2 至 7/13，恒指悄然完成近 6% 的周线突围。</div>
    </div>
  </div>

  <div class="byline">
    <span><span class="red-dot">●</span> MARKET PULSE · 编辑部</span>
    <span>05 / 08 · H.K. EQUITY</span>
  </div>
</section>
</body>
</html>
