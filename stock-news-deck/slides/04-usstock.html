<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../assets/editorial.css">
<title>美股 · 伟大轮动</title>
</head>
<body>
<section class="slide">
  <div class="masthead">
    <div class="name"><span class="zh">市场脉动</span>MARKET PULSE</div>
    <div class="dateline">U.S. · 1H 2026</div>
  </div>

  <div class="pad pad-top" style="display:grid; grid-template-rows:auto auto 1fr; gap:38px; height:calc(1080px - 110px)">
    <div>
      <div class="kicker">美股 · 伟大轮动</div>
      <h2 class="display display-m" style="margin-top:14px; max-width:1400px">资金，从科技巨头<br/>流向<em style="font-style:italic; color:var(--red)">蓝筹与价值</em>。</h2>
    </div>

    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:0; border-top:1px solid var(--hair); border-bottom:1px solid var(--hair); padding:26px 0">
      <div style="border-left:1px solid var(--hair); padding-left:40px"><div class="stat"><div class="v" style="font-size:88px">+12.8%</div><div class="c">纳斯达克 · 上半年</div></div></div>
      <div style="border-left:1px solid var(--hair); padding-left:40px"><div class="stat"><div class="v" style="font-size:88px">+9.6%</div><div class="c">标普 500 · 上半年</div></div></div>
      <div style="border-left:1px solid var(--hair); padding-left:40px"><div class="stat"><div class="v" style="font-size:88px">+8.9%</div><div class="c">道琼斯 · 上半年</div></div></div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:64px; align-content:center">
      <div style="border-left:3px solid var(--red); padding-left:34px">
        <div class="sans-label" style="color:var(--red)">单人扛旗</div>
        <div class="num" style="font-size:128px; color:var(--red); line-height:.84">+400%</div>
        <p class="body" style="margin-top:8px">美光（Micron）上半年涨约 4 倍，<br/>独自贡献纳指约 <strong>26%</strong> 的涨幅。</p>
      </div>
      <div style="border-left:3px solid var(--ink); padding-left:34px">
        <div class="sans-label">新面孔登场</div>
        <div class="num" style="font-size:128px; line-height:.84">+12%</div>
        <p class="body" style="margin-top:8px">SK 海力士 7/10 登陆美股，<br/>首日涨 <strong>12%</strong>，市值站上 <strong>1.22 万亿</strong>。</p>
      </div>
    </div>
  </div>

  <div class="byline">
    <span><span class="red-dot">●</span> MARKET PULSE · 编辑部</span>
    <span>04 / 08 · U.S. EQUITY</span>
  </div>
</section>
</body>
</html>
